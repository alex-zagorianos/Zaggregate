<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Zaggregate</title>
    <script>
      // Set data-theme before paint to avoid a flash of the wrong palette. The
      // authoritative theme comes from GET /api/settings/theme once React mounts;
      // this just reuses the last-known value cached in localStorage.
      (function () {
        try {
          var t = localStorage.getItem("zg-theme");
          if (t === "dark")
            document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
