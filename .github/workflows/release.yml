# Release pipeline: push a version tag (v1.2.3, or v1.2.3-beta1 for a
# pre-release) and this builds the Windows distributable from that exact tree
# and publishes it as a GitHub Release — Zaggregate-v<version>.zip +
# SHA256SUMS.txt under Assets. The app zip ships ONLY as a Release asset (it
# is not committed; Executables/ is a pointer README), and the in-app update
# check (src/webui/api/meta.py) reads releases/latest from this repo, so a
# published release is what makes existing installs see the new version.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # gh release create

jobs:
  release:
    # Only the public repo publishes releases. The private day-to-day mirror
    # (Job-Program) carries this file too and must not build or double-publish.
    if: github.repository == 'alex-zagorianos/Zaggregate'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Tag must match config.APP_VERSION
        shell: pwsh
        run: |
          $version = python -c "import sys; sys.path.insert(0, 'src'); import config; print(config.APP_VERSION)"
          $tag = "${{ github.ref_name }}"
          if ($tag -ne "v$version" -and -not $tag.StartsWith("v$version-")) {
            throw "Tag '$tag' does not match src/config.py APP_VERSION '$version' - bump APP_VERSION or fix the tag."
          }

      - name: Packaging tests
        run: python -m pytest tests/test_smartscreen_kit.py -q

      - name: Build distributable
        # Require the velopack wheel to be bundled: the whole release is an
        # auto-updating Setup.exe, so a build that silently dropped self-update
        # (the class of bug that shipped a browser-only v1.0.0) must fail here.
        env:
          ZAGGREGATE_REQUIRE_VELOPACK: "1"
        run: python src/build_package.py

      - name: Install Velopack CLI (vpk)
        # Pin vpk to the same version as the `velopack` wheel in requirements.txt so
        # the packer and the in-app UpdateManager can never disagree on the feed format.
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Velopack pack
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")   # tag guard above already enforced v$APP_VERSION[-...]
          # vpk_pack_argv() defaults its packDir to the assembled dist/Zaggregate/
          # JobProgram (browser_ext + claude-code included), produced by the build step.
          # Pre-release tag (v1.0.3-beta1) -> beta feed ONLY, at the prerelease
          # version so beta testers stay ahead of stable. Full tag (v1.0.3) -> BOTH
          # feeds at the same bits, so packing stable also carries the beta cohort
          # forward onto it (otherwise a beta install would stall on the last -betaN).
          if ($tag.Contains("-")) {
            python src/build_package.py --velopack --run --channel beta --pack-version $ver
            if ($LASTEXITCODE -ne 0) { throw "vpk pack (beta) failed" }
          } else {
            python src/build_package.py --velopack --run --channel win  --pack-version $ver
            if ($LASTEXITCODE -ne 0) { throw "vpk pack (win) failed" }
            python src/build_package.py --velopack --run --channel beta --pack-version $ver
            if ($LASTEXITCODE -ne 0) { throw "vpk pack (beta) failed" }
          }

      - name: Verify artifacts
        shell: pwsh
        run: |
          $setup = Get-Item dist/Releases/*Setup.exe
          if (-not $setup) { throw "No Setup.exe produced under dist/Releases/" }
          # The feed manifest each installed client polls. Velopack 1.x names it
          # releases.<channel>.json (older: RELEASES-<channel>); accept either so a
          # vpk minor bump doesn't silently pass with no feed.
          $feed = Get-ChildItem dist/Releases | Where-Object {
            $_.Name -match 'releases\..*\.json' -or $_.Name -like 'RELEASES-*'
          }
          if (-not $feed) { throw "No Velopack feed manifest under dist/Releases/" }
          Get-ChildItem dist/Releases | ForEach-Object {
            Write-Host ("  {0}  ({1:N1} MB)" -f $_.Name, ($_.Length / 1MB))
          }

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          # No here-string here: its closing "@ must sit at column 0, which
          # would terminate this YAML block scalar. Join lines instead.
          $notes = @(
            "Download **Setup.exe** below and run it. Zaggregate installs and then keeps itself up to date - from any release on, **Settings -> Check for updates** downloads the new version and restarts into it. No Python install needed.",
            "",
            'First launch: Windows may warn about an "unknown publisher" (the app is unsigned) - click **More info -> Run anyway**.',
            "",
            "Your data lives in ``%LOCALAPPDATA%\JobProgram`` and is never touched by an update. Coming from a v1.0.2 zip? Open the old app, **Settings -> Download a backup**, run Setup.exe, then **Settings -> Restore from backup**.",
            "",
            "The other files below (``*.nupkg``, ``releases.*.json``) are the update feed - the app downloads these itself; you do not need them."
          ) -join "`n"
          $ghArgs = @("release", "create", $tag, "--verify-tag",
                      "--title", "Zaggregate $tag", "--notes", $notes)
          # A hyphenated tag (v1.2.3-beta1) publishes as a pre-release; the
          # update check and the /releases/latest link only follow full releases.
          if ($tag.Contains("-")) { $ghArgs += "--prerelease" } else { $ghArgs += "--latest" }
          # Upload every Velopack output (Setup.exe + the channel nupkgs + feed
          # manifests). GithubSource reads these assets off the release directly.
          $assets = (Get-ChildItem dist/Releases | ForEach-Object { $_.FullName })
          gh @ghArgs $assets
          if ($LASTEXITCODE -ne 0) { throw "gh release create failed" }
