<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           width: 280px; padding: 16px; background: #fafafa; color: #222; }
    h2 { font-size: 1rem; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { font-size: 0.75rem; color: #888; margin-bottom: 14px; }
    .count-box { background: #1a1a2e; color: #fff; border-radius: 8px;
                 padding: 12px 16px; margin-bottom: 14px; text-align: center; }
    .count-box .num { font-size: 2rem; font-weight: 700; }
    .count-box .label { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }
    button { width: 100%; padding: 9px; border: none; border-radius: 6px;
             font-size: 0.875rem; cursor: pointer; margin-bottom: 8px; }
    #send-btn { background: #1a1a2e; color: #fff; }
    #send-btn:hover { background: #2a2a4e; }
    #send-btn:disabled { background: #999; cursor: default; }
    #clear-btn { background: #f0f0f0; color: #555; }
    #clear-btn:hover { background: #e0e0e0; }
    #status { font-size: 0.78rem; min-height: 18px; color: #444; text-align: center; }
    #status.ok  { color: #2e7d32; }
    #status.err { color: #c62828; }
  </style>
</head>
<body>
  <h2>Job Harvester</h2>
  <p class="subtitle">LinkedIn, Indeed, Glassdoor, ZipRecruiter, Dice</p>
  <div class="count-box">
    <div class="num" id="count">0</div>
    <div class="label">jobs collected</div>
  </div>
  <button id="send-btn" disabled>Send to Tool (start receiver first)</button>
  <button id="clear-btn">Clear collected jobs</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
